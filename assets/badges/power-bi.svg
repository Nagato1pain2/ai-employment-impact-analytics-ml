<svg xmlns="http://www.w3.org/2000/svg" width="143" height="24" role="img" aria-label="Power BI: Dashboard">
  <title>Power BI: Dashboard</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#ffffff" stop-opacity=".08"/>
    <stop offset="1" stop-opacity=".08"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="143" height="24" rx="4"/>
